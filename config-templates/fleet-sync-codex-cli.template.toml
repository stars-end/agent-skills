[mcpServers."context-plus"]
type = "stdio"
command = "node"
args = ["~/.local/share/contextplus-patched/build/index.js"]

[mcpServers."context-plus".env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
OPENROUTER_EMBED_MODEL = "openai/text-embedding-3-small"
CONTEXTPLUS_EMBED_PROVIDER = "auto"

[mcpServers."cass-memory"]
type = "stdio"
command = "cass-memory"
args = []

[mcpServers."serena"]
type = "stdio"
command = "serena"
args = []

[mcpServers."llm-tldr"]
type = "stdio"
command = "tldr-mcp"
args = []
