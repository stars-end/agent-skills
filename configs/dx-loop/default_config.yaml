# dx-loop v1 default configuration

# Execution settings
max_attempts: 3
max_revisions: 3
max_parallel: 2
cadence_seconds: 600  # 10 minutes

# Provider configuration (phase-aware routing)
provider: opencode
implement_provider: null  # defaults to provider if not set
review_provider: null     # defaults to provider if not set
# Phase-specific model selection (bd-5w5o.41):
#   When null, the opencode adapter resolves the canonical default per phase.
#   Canonical implement model: zhipuai/glm-5.1
#   Canonical review model:    zhipuai/glm-5.1
#   Override here only when deviating from the canonical phase defaults.
implement_model: null
review_model: null
require_review: true

# Notification settings
notifications:
  slack_webhook_url: null  # Set via environment variable
  suppress_unchanged: true
  max_unchanged_before_log: 10

# Bootstrap gates
bootstrap:
  require_beads_health: true
  require_worktree: true
  require_host_reachable: true

# PR artifact contract
pr_contract:
  require_pr_url: true
  require_pr_head_sha: true
  validate_sha_format: true
  validate_url_format: true
