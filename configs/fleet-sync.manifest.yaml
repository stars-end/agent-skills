# Fleet Sync canonical manifest (V2.1)
# Local-first execution, centralized governance.
schema_version: "2.1"

principles:
  execution: local_first
  state: centralize_state_not_execution
  no_mandatory_gateway: true

hard_constraints:
  epyc12_max_always_on_services: 4
  one_primary_tool_manifest: configs/mcp-tools.yaml
  no_manual_ide_edits: true
  failure_domain_isolation: vm_local

fleet:
  hosts:
    - name: epyc12
      role: hub
      tailscale_ip: 100.107.173.83
    - name: macmini
      role: worker
    - name: homedesktop-wsl
      role: worker
    - name: epyc6
      role: worker

runtime_services:
  required:
    epyc12:
      - beads-dolt.service
  optional:
    epyc12:
      - litellm.service

distribution:
  primary_tool_manifest: configs/mcp-tools.yaml
  skills_install_script: scripts/dx-agents-skills-install.sh
  baseline_publish_script: scripts/publish-baseline.zsh
  baseline_sync_script: scripts/dx-baseline-sync.sh
  config_renderer_script: scripts/dx-mcp-tools-sync.sh

ide_configs:
  merge_mode: patch
  targets:
    codex: ~/.codex/config.toml
    claude: ~/.claude.json
    antigravity: ~/.gemini/antigravity/mcp_config.json
    opencode: ~/.opencode/config.json

beads:
  host: 100.107.173.83
  port: 3307
  test_cmd: "cd ~/bd && bd dolt test --json"

secrets:
  source_of_truth: 1password
  deploy_sink: railway
  direction: op_to_railway
  mappings:
    - name: railway_api_token
      source: op://dev/Agent-Secrets-Production/RAILWAY_API_TOKEN
      targets:
        - type: local_env
          env: RAILWAY_API_TOKEN

dolt_phase2:
  enabled: false
  notes:
    - "Governance DB remains primary for Beads."
    - "Only small control tables allowed (no embeddings/raw logs)."
  tables:
    - name: mcp_tool_manifest
      purpose: version_override_policy
      max_rows: 100
    - name: tool_health
      purpose: fleet_telemetry
      max_rows: 50
    - name: memory_digest
      purpose: sanitized_opt_in_cross_learning
      max_rows: 1000
      ttl_days: 30

weekly_audit:
  script: scripts/dx-audit.sh
  cron_wrapper: scripts/dx-audit-cron.sh
  channel: "#dx-alerts"
