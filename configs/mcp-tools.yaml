# Fleet Sync V2.1 tool manifest
# Primary source for local-first MCP tool distribution and IDE rendering.
schema_version: 1
strategy:
  distribution: git_pull
  execution: local_stdio
  fallback: last_known_good_local

tools:
  context-plus:
    enabled: true
    integration_mode: mcp
    version: "1.0.7"
    install_cmd: "npm view contextplus@1.0.7"
    health_cmd: "timeout 2 npx -y contextplus@1.0.7 2>&1 | grep -q 'Context+ MCP server running'"
    target_ides:
      - codex-cli
      - claude-code
      - antigravity
      - opencode
    mcp:
      type: stdio
      command: "npx"
      args:
        - "-y"
        - "contextplus@1.0.7"
    runtime: node

  cass-memory:
    enabled: true
    integration_mode: cli
    version: "0.2.3"
    install_cmd: "which cm || echo 'cm should be installed via Homebrew'"
    health_cmd: "cm --version && cm doctor --json | jq -r '.data.overallStatus' | grep -q 'pass\\|degraded'"
    target_ides: []
    cli:
      primary_commands:
        - "cm context"
        - "cm quickstart"
        - "cm doctor"
      optional_mcp_serve: "cm serve --port 8765"
    runtime: homebrew
    sharing:
      default: local_only
      opt_in_env: CASS_SHARE_MEMORY
      disable_env: CASS_NO_SHARE

  serena:
    enabled: false
    integration_mode: mcp
    disabled_reason: "PyPI package serena==0.9.1 provides no executable entrypoint (uv tool install fails). Owner: platform-team. Next: Contact maintainer or find alternative tool."
    version: "0.9.1"
    install_cmd: "uv tool install serena==0.9.1"
    health_cmd: "serena --version"
    target_ides:
      - codex-cli
      - claude-code
      - antigravity
      - opencode
    mcp:
      type: stdio
      command: "serena"
      args: []
    runtime: python

  llm-tldr:
    enabled: true
    integration_mode: mcp
    version: "1.5.2"
    install_cmd: "uv tool install \"llm-tldr==1.5.2\""
    health_cmd: "tldr --version"
    target_ides:
      - codex-cli
      - claude-code
      - opencode
      - gemini-cli
    mcp:
      type: stdio
      command: "tldr-mcp"
      args: []
    runtime: python

render:
  merge_mode: patch
  preserve_user_overrides: true
  write_paths:
    codex-cli: ~/.codex/config.toml
    claude-code: ~/.claude.json
    antigravity: ~/.gemini/antigravity/mcp_config.json
    opencode: ~/.opencode/config.json
    gemini-cli: ~/.gemini/antigravity/mcp_config.json

verification:
  require_manifests:
    - configs/fleet-sync.manifest.yaml
    - configs/mcp-tools.yaml
  require_skill_stubs:
    - extended/context-plus/SKILL.md
    - extended/cass-memory/SKILL.md
    - extended/llm-tldr/SKILL.md
