# Fleet Sync V2.1 tool manifest
# Primary source for local-first MCP tool distribution and IDE rendering.
schema_version: 1
strategy:
  distribution: git_pull
  execution: local_stdio
  fallback: last_known_good_local

tools:
  cass-memory:
    enabled: true
    version: "git"
    integration_mode: cli
    install_cmd: "brew install dicklesworthstone/tap/cm"
    health_cmd: "cm --version"
    target_ides: []
    runtime: node
    sharing:
      default: local_only
      opt_in_env: CASS_SHARE_MEMORY
      disable_env: CASS_NO_SHARE

  llm-tldr:
    enabled: true
    version: "1.5.2"
    integration_mode: mcp
    install_cmd: "uv tool install \"llm-tldr==1.5.2\""
    health_cmd: "tldr-mcp --version || llm-tldr --version"
    target_ides:
      - codex-cli
      - claude-code
      - antigravity
      - opencode
      - gemini-cli
    mcp:
      type: stdio
      command: "tldr-mcp"
      args: []
    runtime: python

  context-plus:
    enabled: false
    version: "1.0.7"
    integration_mode: mcp
    disabled_reason: "Package @forloopcodes/contextplus not found in npm registry (404). The correct package name is 'contextplus' (without scope). Re-evaluate if package is republished or fork is available."
    install_cmd: "npm install -g contextplus@1.0.7"
    health_cmd: "contextplus --version"
    target_ides:
      - codex-cli
      - claude-code
      - antigravity
      - opencode
      - gemini-cli
    mcp:
      type: stdio
      command: "contextplus"
      args: []
    runtime: node

  serena:
    enabled: false
    version: "git"
    integration_mode: mcp
    disabled_reason: "PyPI package serena==0.9.1 provides no executable entrypoint (uv tool install fails). Git-based install from oraios/serena required but not verified. Blocked until executable proof and client visibility are real."
    install_cmd: "uv tool install git+https://github.com/oraios/serena.git"
    health_cmd: "serena start-mcp-server --help"
    target_ides:
      - codex-cli
      - claude-code
      - antigravity
      - opencode
      - gemini-cli
    mcp:
      type: stdio
      command: "serena"
      args:
        - "start-mcp-server"
    runtime: python

render:
  merge_mode: patch
  preserve_user_overrides: true
  write_paths:
    codex-cli: ~/.codex/config.toml
    claude-code: ~/.claude.json
    antigravity: ~/.gemini/antigravity/mcp_config.json
    opencode: ~/.opencode/config.json
    gemini-cli: ~/.gemini/antigravity/mcp_config.json

verification:
  require_manifests:
    - configs/fleet-sync.manifest.yaml
    - configs/mcp-tools.yaml
  require_skill_stubs:
    - extended/cass-memory/SKILL.md
    - extended/context-plus/SKILL.md
    - extended/llm-tldr/SKILL.md
