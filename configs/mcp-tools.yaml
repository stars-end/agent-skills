# Fleet Sync V2.3 tool manifest
# Primary source for host-local MCP tool distribution and IDE rendering.
# Tool Classes (integration_mode):
#   - mcp: MCP server rendered into IDE configs (requires mcp.* block)
#   - cli: CLI-native tool (no IDE config rendering, host runtime health only)
#
schema_version: 2
strategy:
  distribution: git_pull
  execution: local_stdio
  fallback: last_known_good_local

tools:
  # ============================================================
  # cass-memory: pilot-only CLI episodic memory (disabled by default)
  # Not rendered to IDE configs and not part of the canonical assistant loop.
  # ============================================================
  cass-memory:
    enabled: false
    integration_mode: cli
    version: "git"
    install_cmd: "cm --version 2>/dev/null || npm install -g Dicklesworthstone/cass_memory_system"
    health_cmd: "cm --version"
    runtime: node
    binary: "cm"
    controls:
      share_env: CASS_SHARE_MEMORY
      disable_env: CASS_NO_SHARE
    upstream: "https://github.com/Dicklesworthstone/cass_memory_system"
    docs: "https://github.com/Dicklesworthstone/cass_memory_system#readme"

  # ============================================================
  # serena: AI assistant memory (MCP mode)
  # Install from GitHub (PyPI has unrelated AMQP package)
  # ============================================================
  serena:
    enabled: true
    integration_mode: mcp
    version: "git"
    install_cmd: "serena --version 2>/dev/null || uv tool install git+https://github.com/oraios/serena.git"
    health_cmd: "serena --help 2>&1 | head -1"
    target_ides:
      - codex-cli
      - claude-code
      - antigravity
      - opencode
      - gemini-cli
    mcp:
      type: stdio
      command: "~/.local/bin/serena"
      args:
        - "start-mcp-server"
        - "--enable-web-dashboard"
        - "false"
        - "--open-web-dashboard"
        - "false"
    runtime: python
    upstream: "https://github.com/oraios/serena"
    docs: "https://github.com/oraios/serena#readme"

render:
  merge_mode: patch
  preserve_user_overrides: true
  write_paths:
    codex-cli: ~/.codex/config.toml
    claude-code: ~/.claude.json
    antigravity: ~/.gemini/antigravity/mcp_config.json
    opencode: ~/.config/opencode/opencode.jsonc
    gemini-cli: ~/.gemini/settings.json

verification:
  require_manifests:
    - configs/fleet-sync.manifest.yaml
    - configs/mcp-tools.yaml
  require_skill_stubs:
    - extended/fleet-sync/SKILL.md
    - extended/cass-memory/SKILL.md
    - extended/serena/SKILL.md
