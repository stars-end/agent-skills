# Fleet Sync V2.3 tool manifest
# Primary source for local-first MCP tool distribution and IDE rendering.
#
# Tool Classes (integration_mode):
#   - mcp: MCP server rendered into IDE configs (requires mcp.* block)
#   - cli: CLI-native tool (no IDE config rendering, host runtime health only)
#
schema_version: 2
strategy:
  distribution: git_pull
  execution: local_stdio
  fallback: last_known_good_local

# Shared anchor for context-plus embedding env
x-cp-env: &cp-env
  OPENROUTER_EMBED_MODEL: "openai/text-embedding-3-small"
  CONTEXTPLUS_EMBED_PROVIDER: "auto"

tools:
  # ============================================================
  # llm-tldr: Static analysis context slicing (MCP mode)
  # ============================================================
  llm-tldr:
    enabled: true
    integration_mode: mcp
    version: "1.5.2"
    install_cmd: "uv tool install \"llm-tldr==1.5.2\""
    health_cmd: "tldr-mcp --version || llm-tldr --version"
    target_ides:
      - codex-cli
      - claude-code
      - antigravity
      - opencode
      - gemini-cli
    mcp:
      type: stdio
      command: "tldr-mcp"
      args: []
    runtime: python
    upstream: "https://github.com/parcadei/llm-tldr"
    docs: "https://github.com/parcadei/llm-tldr#readme"

  # ============================================================
  # cass-memory: pilot-only CLI episodic memory (disabled by default)
  # Not rendered to IDE configs and not part of the canonical assistant loop.
  # ============================================================
  cass-memory:
    enabled: false
    integration_mode: cli
    version: "git"
    install_cmd: "cm --version 2>/dev/null || npm install -g Dicklesworthstone/cass_memory_system"
    health_cmd: "cm --version"
    runtime: node
    binary: "cm"
    controls:
      share_env: CASS_SHARE_MEMORY
      disable_env: CASS_NO_SHARE
    upstream: "https://github.com/Dicklesworthstone/cass_memory_system"
    docs: "https://github.com/Dicklesworthstone/cass_memory_system#readme"

  # ============================================================
  # context-plus: Structural context analysis (MCP mode)
  # LOCAL PATCHED BUILD — not from npm
  # Install: scripts/install-contextplus-patched.sh
  # Embeddings: OpenRouter (primary) with Ollama fallback
  #
  # Launcher contract: contextplus [path] starts the MCP server
  # for the specified path (per upstream README). Each canonical
  # repo gets its own MCP server entry launched with an explicit
  # repo path argument. This ensures the server indexes the
  # correct repo regardless of session CWD.
  #
  # The context-plus base entry (no path arg, cli mode) is
  # retained for install/health tracking only — not rendered.
  #
  # CONTEXTPLUS_ROOT env var: kept as escape-hatch only. The
  # primary fleet contract is explicit path args per entry.
  # ============================================================
  context-plus:
    enabled: true
    integration_mode: cli
    version: "patched"
    install_cmd: "scripts/install-contextplus-patched.sh"
    health_cmd: "test -f ~/.local/share/contextplus-patched/build/index.js"
    runtime: node
    env:
      optional:
        - OLLAMA_EMBED_MODEL
        - OLLAMA_CHAT_MODEL
        - OLLAMA_API_KEY
        - OPENROUTER_API_KEY
        - OPENROUTER_EMBED_MODEL
        - CONTEXTPLUS_EMBED_PROVIDER
        - CONTEXTPLUS_ROOT
    upstream: "https://github.com/ForLoopCodes/contextplus"
    docs: "https://github.com/ForLoopCodes/contextplus#readme"

  # Repo-scoped MCP server entries
  # Each launches the same patched build with the repo path as arg.
  # Upstream README: "contextplus [path]" starts the MCP server
  # for the specified path (defaults to current directory).
  context-plus-agent-skills:
    enabled: true
    integration_mode: mcp
    version: "patched"
    target_ides:
      - codex-cli
      - claude-code
      - antigravity
      - opencode
      - gemini-cli
    mcp:
      type: stdio
      command: "node"
      args:
        - "~/.local/share/contextplus-patched/build/index.js"
        - "~/agent-skills"
      per_ide:
        gemini-cli:
          command: "bash"
          args:
            - "-lc"
            - "exec node ~/.local/share/contextplus-patched/build/index.js ~/agent-skills 2>/dev/null"
        antigravity:
          command: "bash"
          args:
            - "-lc"
            - "exec node ~/.local/share/contextplus-patched/build/index.js ~/agent-skills 2>/dev/null"
      env: *cp-env
      env_from_parent:
        - OPENROUTER_API_KEY
    runtime: node
    upstream: "https://github.com/ForLoopCodes/contextplus"
    docs: "https://github.com/ForLoopCodes/contextplus#readme"

  context-plus-prime-radiant-ai:
    enabled: true
    integration_mode: mcp
    version: "patched"
    target_ides:
      - codex-cli
      - claude-code
      - antigravity
      - opencode
      - gemini-cli
    mcp:
      type: stdio
      command: "node"
      args:
        - "~/.local/share/contextplus-patched/build/index.js"
        - "~/prime-radiant-ai"
      per_ide:
        gemini-cli:
          command: "bash"
          args:
            - "-lc"
            - "exec node ~/.local/share/contextplus-patched/build/index.js ~/prime-radiant-ai 2>/dev/null"
        antigravity:
          command: "bash"
          args:
            - "-lc"
            - "exec node ~/.local/share/contextplus-patched/build/index.js ~/prime-radiant-ai 2>/dev/null"
      env: *cp-env
      env_from_parent:
        - OPENROUTER_API_KEY
    runtime: node
    upstream: "https://github.com/ForLoopCodes/contextplus"
    docs: "https://github.com/ForLoopCodes/contextplus#readme"

  context-plus-affordabot:
    enabled: true
    integration_mode: mcp
    version: "patched"
    target_ides:
      - codex-cli
      - claude-code
      - antigravity
      - opencode
      - gemini-cli
    mcp:
      type: stdio
      command: "node"
      args:
        - "~/.local/share/contextplus-patched/build/index.js"
        - "~/affordabot"
      per_ide:
        gemini-cli:
          command: "bash"
          args:
            - "-lc"
            - "exec node ~/.local/share/contextplus-patched/build/index.js ~/affordabot 2>/dev/null"
        antigravity:
          command: "bash"
          args:
            - "-lc"
            - "exec node ~/.local/share/contextplus-patched/build/index.js ~/affordabot 2>/dev/null"
      env: *cp-env
      env_from_parent:
        - OPENROUTER_API_KEY
    runtime: node
    upstream: "https://github.com/ForLoopCodes/contextplus"
    docs: "https://github.com/ForLoopCodes/contextplus#readme"

  context-plus-llm-common:
    enabled: true
    integration_mode: mcp
    version: "patched"
    target_ides:
      - codex-cli
      - claude-code
      - antigravity
      - opencode
      - gemini-cli
    mcp:
      type: stdio
      command: "node"
      args:
        - "~/.local/share/contextplus-patched/build/index.js"
        - "~/llm-common"
      per_ide:
        gemini-cli:
          command: "bash"
          args:
            - "-lc"
            - "exec node ~/.local/share/contextplus-patched/build/index.js ~/llm-common 2>/dev/null"
        antigravity:
          command: "bash"
          args:
            - "-lc"
            - "exec node ~/.local/share/contextplus-patched/build/index.js ~/llm-common 2>/dev/null"
      env: *cp-env
      env_from_parent:
        - OPENROUTER_API_KEY
    runtime: node
    upstream: "https://github.com/ForLoopCodes/contextplus"
    docs: "https://github.com/ForLoopCodes/contextplus#readme"

  # ============================================================
  # serena: AI assistant memory (MCP mode)
  # Install from GitHub (PyPI has unrelated AMQP package)
  # ============================================================
  serena:
    enabled: true
    integration_mode: mcp
    version: "git"
    install_cmd: "serena --version 2>/dev/null || uv tool install git+https://github.com/oraios/serena.git"
    health_cmd: "serena --help 2>&1 | head -1"
    target_ides:
      - codex-cli
      - claude-code
      - antigravity
      - opencode
      - gemini-cli
    mcp:
      type: stdio
      command: "serena"
      args:
        - "start-mcp-server"
    runtime: python
    upstream: "https://github.com/oraios/serena"
    docs: "https://github.com/oraios/serena#readme"

render:
  merge_mode: patch
  preserve_user_overrides: true
  write_paths:
    codex-cli: ~/.codex/config.toml
    claude-code: ~/.claude.json
    antigravity: ~/.gemini/antigravity/mcp_config.json
    opencode: ~/.config/opencode/opencode.jsonc
    gemini-cli: ~/.gemini/settings.json

verification:
  require_manifests:
    - configs/fleet-sync.manifest.yaml
    - configs/mcp-tools.yaml
  require_skill_stubs:
    - extended/fleet-sync/SKILL.md
    - extended/llm-tldr/SKILL.md
    - extended/cass-memory/SKILL.md
    - extended/context-plus/SKILL.md
    - extended/serena/SKILL.md
