# dx-runner profile: cc-glm-research
# Fallback deep-research lane for Gemini startup/preflight failures.

profile:
  name: cc-glm-research
  description: Read-only deep research fallback using cc-glm
  version: "1.0.0"

provider:
  name: cc-glm
  model: glm-5
  allow_model_override: false
  execution_mode: run
  fallback_provider: null

concurrency:
  max_parallel: 2
  queue_timeout_sec: 60

preflight:
  strict: true
  policy:
    auth_missing: error
    token_file_error: error
    provider_unavailable: error
    worktree_missing: error

timeouts:
  max_runtime_minutes: 120
  no_mutation_timeout_minutes: 30
  stall_minutes: 20
  first_output_grace_seconds: 180
  first_mutation_grace_seconds: 300

scope:
  enforce_allowed_paths: true
  allowed_paths_file: null
  mutation_budget: null
  file_budget: null

gates:
  baseline: optional
  feature_key: required
  commit_artifact: optional
  railway_auth: optional
