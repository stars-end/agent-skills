# dx-runner profile: gemini-research
# Primary deep-research lane using Gemini.

profile:
  name: gemini-research
  description: Read-only deep research dispatch using Gemini
  version: "1.0.0"

provider:
  name: gemini
  model: gemini-3-flash-preview
  allow_model_override: false
  execution_mode: run
  fallback_provider: cc-glm

concurrency:
  max_parallel: 2
  queue_timeout_sec: 30

preflight:
  strict: true
  policy:
    gemini_binary_missing: error
    auth_unavailable: error
    model_unavailable: error
    canonical_model_probe_timeout: error
    worktree_missing: error

timeouts:
  max_runtime_minutes: 90
  no_mutation_timeout_minutes: 20
  stall_minutes: 15
  first_output_grace_seconds: 120
  first_mutation_grace_seconds: 300

scope:
  enforce_allowed_paths: true
  allowed_paths_file: null
  mutation_budget: null
  file_budget: null

gates:
  baseline: optional
  feature_key: required
  commit_artifact: optional
  railway_auth: optional
