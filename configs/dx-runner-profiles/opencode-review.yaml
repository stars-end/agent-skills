# dx-runner profile: opencode-review
# Compatibility alias for the primary dx-review OpenCode Kimi lane.

profile:
  name: opencode-review
  description: Compatibility alias for review-safe OpenCode Kimi K2.6 dispatch
  version: "1.0.0"

provider:
  name: opencode
  model: opencode-go/kimi-k2.6
  allow_model_override: false
  execution_mode: run
  fallback_provider: null

concurrency:
  max_parallel: 2
  queue_timeout_sec: 60

preflight:
  strict: true
  policy:
    opencode_binary_missing: error
    model_unavailable: error
    auth_or_quota_blocked: error
    worktree_missing: error
    canonical_model_probe_timeout: error
    mise_untrusted: error
    beads_mcp_missing: warn

timeouts:
  max_runtime_minutes: 90
  no_mutation_timeout_minutes: 20
  stall_minutes: 15
  first_output_grace_seconds: 180
  first_mutation_grace_seconds: 300

scope:
  enforce_allowed_paths: true
  allowed_paths_file: null
  mutation_budget: null
  file_budget: null

gates:
  baseline: optional
  feature_key: required
  commit_artifact: optional
  railway_auth: optional
